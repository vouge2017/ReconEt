version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: reconet-db
    environment:
      POSTGRES_DB: reconet
      POSTGRES_USER: reconet
      POSTGRES_PASSWORD: reconet_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconet"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: reconet-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://reconet:reconet_dev_2026@db:5432/reconet
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: reconet-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
